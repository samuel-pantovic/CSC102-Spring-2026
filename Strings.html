<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Validation </title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <h1>Input Validation</h1>
    </header>
    <main>
        <!-- this div is where we will show messages to the user about there input -->
        <div id="divMessage"></div>
        <form>
            <!-- add div tags around each label/ input combo, so that they are on the 
             line together; labels & inputs are inline elements; div is block  -->
             <!-- this is the input for the first name  -->
            <div>
                <label for="txtFirstName">First Name: </label>
                <input type="text" id="txtFirstName">
            </div>

            <!-- this is the input for the last name  -->
             <div>
                <label for="txtLastName">Last Name: </label>
                <input type="text" id="txtLastName">
             </div>

             <div>
                <label for="txtZip">Zip Code: </label>
                <input type="text" id="txtZip">
             </div>

             <!-- use a button to validate the form, set the type to button so clicking
              does not submit the form -->
             <button type="button" onclick="validate();">Validate!</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
